<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Mockup | Driving School</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-nav">
        <a href="login.html" class="topbar-logo">Driving License School</a>
        <ul class="topbar-menu">
          <li><a href="login.html" class="active">Login</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
      </div>
    </header>

    <main class="auth-wrapper container">
      <div class="card auth-card">
        <h2 class="text-center mb-4">Secure Login</h2>
        <form id="demo-login-form">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input
              type="text"
              class="form-control"
              placeholder="Enter username"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              placeholder="Enter password"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary w-100 mt-2 btn-lg">
            Log Into Dashboard
          </button>
        </form>


      </div>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
