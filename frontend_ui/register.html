<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Mockup | Driving School</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-nav">
        <a href="login.html" class="topbar-logo">Driving License School</a>
        <ul class="topbar-menu">
          <li><a href="login.html">Login</a></li>
          <li><a href="register.html" class="active">Register</a></li>
        </ul>
      </div>
    </header>

    <main class="auth-wrapper container">
      <div class="card auth-card auth-card-lg">
        <h2 class="text-center mb-4">Learner Registration</h2>
        <form action="login.html">
          <div class="grid grid-cols-2 gap-md">
            <div class="form-group mb-0">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" placeholder="Abel Mes" />
            </div>
            <div class="form-group mb-0">
              <label class="form-label">Email Address</label>
              <input
                type="email"
                class="form-control"
                placeholder="john@example.com"
              />
            </div>
            <div class="form-group mb-0">
              <label class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                placeholder="Enter password"
              />
            </div>
            <div class="form-group mb-0">
              <label class="form-label">National ID</label>
              <input type="text" class="form-control" placeholder="e.g., 87654321" />
            </div>
            <!-- Make this span full width using standard CSS flex or grid-column if we had utility -->
            <div class="form-group mb-0" style="grid-column: 1 / -1">
              <label class="form-label">Choose Campus/Branch</label>
              <select class="form-control">
                <option>Main Branch (Addis Ababa)</option>
                <option>Adama Branch</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 mt-4">
            Sign Up Demo
          </button>
        </form>
      </div>
    </main>
  </body>
</html>
